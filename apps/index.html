<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apps — dochigarden</title>
<meta name="description" content="Apps from dochigarden — calm, native software for the Mac, grown one at a time.">
<meta name="theme-color" content="#F4EFE3">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235E7A52' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 21V10'/%3E%3Cpath d='M12 13c0-3 2-5 5-5 0 3-2 5-5 5z'/%3E%3Cpath d='M12 15c0-3-2-5-5-5 0 3 2 5 5 5z'/%3E%3C/svg%3E">
<style>
  *{margin:0;box-sizing:border-box}
  :root{--paper:#F4EFE3;--ink:#34382C;--soft:#6E7A5E;--leaf:#5E7A52;--leaf2:#3F5537;--line:#DED6C2;--card:#FBF7EC;
    --serif:ui-serif,"New York","Iowan Old Style",Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  html,body{min-height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:40px 24px 80px;}
  .top{width:100%;max-width:560px;display:flex;justify-content:flex-start;}
  .home{font-family:var(--serif);font-size:20px;font-weight:600;text-decoration:none;color:var(--ink);letter-spacing:-.01em;}
  .home .g{color:var(--leaf);font-style:italic;}
  .head{text-align:center;margin:72px 0 40px;}
  .head h1{font-family:var(--serif);font-size:clamp(34px,5.5vw,46px);font-weight:600;letter-spacing:-.01em;}
  .head p{margin-top:14px;color:var(--soft);font-size:18px;}
  .apps{width:100%;max-width:560px;display:grid;gap:16px;}
  .app{display:flex;align-items:center;gap:18px;text-decoration:none;color:inherit;
    border:1px solid var(--line);border-radius:18px;padding:22px 24px;background:var(--card);
    transition:border-color .18s ease,transform .18s ease;}
  .app:hover{border-color:var(--leaf);transform:translateY(-2px);}
  .app .ic{width:48px;height:48px;flex:none;}
  .app h2{font-family:var(--serif);font-size:23px;font-weight:600;}
  .app p{color:var(--soft);font-size:15px;margin-top:2px;}
  .app .arw{margin-left:auto;color:var(--leaf);font-size:22px;}
  footer{margin-top:64px;color:var(--soft);font-size:13px;}
  @media(prefers-reduced-motion:reduce){.app{transition:none}}
</style>
</head>
<body>
  <div class="top"><a class="home" href="/">dochi<span class="g">garden</span></a></div>

  <div class="head">
    <h1>The apps</h1>
    <p>A few calm tools, grown one at a time.</p>
  </div>

  <div class="apps">
    <a class="app" href="/cloister/">
      <svg class="ic" viewBox="0 0 26 26" aria-hidden="true"><rect x="1" y="1" width="24" height="24" rx="7" fill="#22432F"/><circle cx="13" cy="13" r="6.4" fill="#2F5C3E"/><circle cx="13" cy="13" r="7.4" fill="none" stroke="#EDE6D6" stroke-width="1.1" opacity=".5"/><path d="M13 5.6 A7.4 7.4 0 1 1 5.6 13" fill="none" stroke="#E7C878" stroke-width="1.6" stroke-linecap="round"/><circle cx="13" cy="5.6" r="1" fill="#F4E4B8"/></svg>
      <div><h2>Cloister</h2><p>A calm focus timer for macOS.</p></div>
      <span class="arw" aria-hidden="true">→</span>
    </a>
  </div>

  <footer>More growing, slowly.</footer>
</body>
</html>
