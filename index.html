<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dochigarden — a quiet garden of Mac software</title>
<meta name="description" content="dochigarden — calm, native software for the Mac, grown slowly and with care.">
<meta name="theme-color" content="#0C1F15">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Crect x='1' y='1' width='24' height='24' rx='7' fill='%2322432F'/%3E%3Cpath d='M13 19c-3 0-6-2-6-6 4 0 6 2 6 6zM13 19c3 0 6-2 6-6-4 0-6 2-6 6z' fill='%235FB98A'/%3E%3Cpath d='M13 19V9' stroke='%23E7C878' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  *{margin:0;box-sizing:border-box}
  :root{--bg:#0C1F15;--ink:#EDE6D6;--sage:#A7C6B2;--moss:#7BA487;--gold:#E7C878;--line:#2A4A38;
    --serif:ui-serif,"New York","Iowan Old Style",Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  html,body{min-height:100%}
  body{background:radial-gradient(130% 120% at 20% -10%,#17392A,var(--bg) 62%);color:var(--ink);
    font-family:var(--sans);display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:64px 24px;text-align:center;}
  .mark{font-family:var(--serif);font-size:clamp(36px,7vw,58px);font-weight:600;letter-spacing:-.015em;}
  .mark .g{color:var(--gold);font-style:italic;}
  .tag{margin-top:18px;color:var(--sage);font-size:clamp(16px,2.4vw,20px);max-width:42ch;line-height:1.5;}
  .apps{margin-top:48px;display:grid;gap:16px;width:100%;max-width:440px;}
  .app{display:flex;align-items:center;gap:16px;text-align:left;text-decoration:none;color:inherit;
    border:1px solid var(--line);border-radius:16px;padding:18px 22px;background:rgba(30,69,49,.35);
    transition:border-color .18s ease,transform .18s ease;}
  .app:hover{border-color:var(--moss);transform:translateY(-2px);}
  .app .ic{width:44px;height:44px;flex:none;}
  .app h2{font-family:var(--serif);font-size:22px;font-weight:600;}
  .app p{color:var(--sage);font-size:14.5px;margin-top:2px;}
  .app .arw{margin-left:auto;color:var(--moss);font-size:20px;}
  footer{margin-top:56px;color:var(--moss);font-size:13.5px;letter-spacing:.01em;}
  @media(prefers-reduced-motion:reduce){.app{transition:none}}
</style>
</head>
<body>
  <div class="mark">dochi<span class="g">garden</span></div>
  <p class="tag">A quiet garden of calm, native software for the Mac — grown slowly, with care.</p>

  <div class="apps">
    <a class="app" href="/cloister/">
      <svg class="ic" viewBox="0 0 26 26" aria-hidden="true"><rect x="1" y="1" width="24" height="24" rx="7" fill="#22432F"/><circle cx="13" cy="13" r="6.4" fill="#2F5C3E"/><circle cx="13" cy="13" r="7.4" fill="none" stroke="#EDE6D6" stroke-width="1.1" opacity=".5"/><path d="M13 5.6 A7.4 7.4 0 1 1 5.6 13" fill="none" stroke="#E7C878" stroke-width="1.6" stroke-linecap="round"/><circle cx="13" cy="5.6" r="1" fill="#F4E4B8"/></svg>
      <div><h2>Cloister</h2><p>A calm focus timer for macOS.</p></div>
      <span class="arw" aria-hidden="true">→</span>
    </a>
  </div>

  <footer>Made with care by 도치 · Dochi</footer>
</body>
</html>
