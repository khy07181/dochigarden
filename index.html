<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dochigarden — a small garden of calm Mac software</title>
<meta name="description" content="dochigarden — a small studio growing calm, native software for the Mac.">
<meta name="theme-color" content="#F4EFE3">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235E7A52' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 21V10'/%3E%3Cpath d='M12 13c0-3 2-5 5-5 0 3-2 5-5 5z'/%3E%3Cpath d='M12 15c0-3-2-5-5-5 0 3 2 5 5 5z'/%3E%3C/svg%3E">
<style>
  *{margin:0;box-sizing:border-box}
  :root{--paper:#F4EFE3;--ink:#34382C;--soft:#6E7A5E;--leaf:#5E7A52;--leaf2:#3F5537;--line:#DED6C2;
    --serif:ui-serif,"New York","Iowan Old Style",Palatino,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;}
  html,body{min-height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;padding:64px 24px;text-align:center;}
  .sprout{width:46px;height:46px;margin-bottom:28px;color:var(--leaf);}
  .mark{font-family:var(--serif);font-size:clamp(40px,7.5vw,62px);font-weight:600;letter-spacing:-.015em;}
  .mark .g{color:var(--leaf);font-style:italic;}
  .tag{margin-top:20px;color:var(--soft);font-size:clamp(16px,2.4vw,20px);max-width:38ch;line-height:1.55;}
  .cta{margin-top:40px;}
  .cta a{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--leaf2);
    font-weight:600;font-size:17px;border-bottom:1.5px solid var(--line);padding-bottom:3px;transition:border-color .18s ease;}
  .cta a:hover{border-color:var(--leaf);}
  footer{margin-top:58px;color:var(--soft);font-size:13px;letter-spacing:.01em;}
</style>
</head>
<body>
  <svg class="sprout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 21V10"/><path d="M12 13c0-3 2-5 5-5 0 3-2 5-5 5z"/><path d="M12 15c0-3-2-5-5-5 0 3 2 5 5 5z"/>
  </svg>
  <div class="mark">dochi<span class="g">garden</span></div>
  <p class="tag">A small studio growing calm, native software for the Mac.</p>
  <div class="cta"><a href="/apps/">See the apps →</a></div>
  <footer>Made with care by 도치 · Dochi</footer>
</body>
</html>
